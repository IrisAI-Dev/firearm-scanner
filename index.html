<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IRIS Firearm Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#fff;height:100vh;overflow:hidden;display:flex;flex-direction:column}
        .hdr{padding:10px 16px;background:#16213e;text-align:center;font-size:15px;font-weight:600;border-bottom:2px solid #0f3460;flex-shrink:0}
        .hdr span{color:#e94560}
        .cam{position:relative;flex:1;overflow:hidden;background:#000}
        video{width:100%;height:100%;object-fit:cover}
        .frame{position:absolute;top:8%;left:4%;right:4%;height:35%;border:2px solid #e94560;border-radius:12px;box-shadow:0 0 0 9999px rgba(0,0,0,.45);pointer-events:none}
        .line{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#e94560,transparent);animation:sc 2s ease-in-out infinite}
        @keyframes sc{0%,100%{top:0}50%{top:100%}}
        .hint{position:absolute;bottom:-28px;width:100%;text-align:center;font-size:13px;color:#aaa}
        .bot{background:#16213e;padding:12px;flex-shrink:0;max-height:55vh;overflow-y:auto}
        #st{text-align:center;font-size:14px;color:#8899aa;padding:4px 0}
        #st.ok{color:#4ecca3}#st.err{color:#e94560}
        .res{background:#0f1b36;border:1px solid #0f3460;border-radius:8px;padding:10px;margin-top:8px;font-size:13px}
        .res .r{display:flex;padding:2px 0}.res .l{color:#6b7fa0;min-width:85px;font-size:12px}.res .v{color:#fff;font-weight:500}
        .res .v.w{color:#e94560}.res .v.g{color:#4ecca3}
        .btns{text-align:center;margin-top:10px}
        .btn{display:inline-block;padding:10px 20px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;color:#fff;margin:0 4px}
        .bp{background:#e94560}.bs{background:#0f3460}
        .btn:active{opacity:.7}
        .hid{display:none!important}
    </style>
</head>
<body>
<div class="hdr"><span>IRIS</span> Firearm Licence Scanner</div>
<div class="cam">
    <video id="vid" autoplay playsinline muted></video>
    <div class="frame" id="fr">
        <div class="line" id="ln"></div>
        <div class="hint">Point camera at the barcode on back of card</div>
    </div>
</div>
<div class="bot">
    <div id="st">Loading scanner...</div>
    <div id="rs" class="hid"></div>
    <div id="bt" class="btns hid">
        <button class="btn bp" onclick="send()">Send to IRIS</button>
        <button class="btn bs" onclick="again()">Scan Again</button>
    </div>
</div>

<!-- ZXing JS library for client-side PDF417 decoding -->
<script type="module">
import {BrowserMultiFormatReader, BarcodeFormat, DecodeHintType} from 'https://cdn.jsdelivr.net/npm/@nicolo-ribaudo/chokidar-3@latest/dist/zxing-browser.esm.min.js';

const vid=document.getElementById('vid'),st=document.getElementById('st'),
      rs=document.getElementById('rs'),bt=document.getElementById('bt'),
      ln=document.getElementById('ln');
const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand()}

let scanning=false,rawText=null,reader=null;

const LABELS={licence_type:'Type',id_number:'ID Number',station_code:'Station',full_name:'Name',
    section:'Section',issue_date:'Issued',expiry_date:'Expires',serial_number:'Serial',
    firearm_type:'Firearm',make:'Make',model:'Model',calibre:'Calibre',licence_number:'Licence #'};
const FIELDS=['licence_type','id_number','station_code','full_name','section','issue_date',
    'expiry_date','serial_number','firearm_type','make','model','calibre','barrel_serial',
    'barrel_make','receiver_serial','receiver_make','frame_serial','frame_make','licence_number','cfr_record_id'];

function parse(text){
    const p=text.split('|'),o={};
    FIELDS.forEach((f,i)=>{o[f]=p[i]||''});
    o._raw=text;return o;
}

async function startCam(){
    try{
        const stream=await navigator.mediaDevices.getUserMedia({
            video:{facingMode:{ideal:'environment'},width:{ideal:1920},height:{ideal:1080}}
        });
        vid.srcObject=stream;
        await vid.play();
        st.textContent='Scanning for barcode...';
        scanning=true;
        scanLoop();
    }catch(e){
        st.textContent='Camera: '+e.message;
        st.className='err';
    }
}

async function initReader(){
    try{
        const hints=new Map();
        hints.set(DecodeHintType.POSSIBLE_FORMATS,[BarcodeFormat.PDF_417]);
        hints.set(DecodeHintType.TRY_HARDER,true);
        reader=new BrowserMultiFormatReader(hints);
        return true;
    }catch(e){
        console.error('Reader init:',e);
        return false;
    }
}

let fc=0;
async function scanLoop(){
    if(!scanning)return;
    fc++;
    if(fc%5===0 && reader){
        try{
            const result=await reader.decodeOnceFromVideoDevice(undefined,vid);
            const text=result.getText();
            if(text&&text.includes('|')){
                scanning=false;
                found(text);
                return;
            }
        }catch(e){/* NotFoundException normal */}
    }
    requestAnimationFrame(scanLoop);
}

// Alternative: continuous decode
async function startContinuousScan(){
    if(!reader)return;
    try{
        st.textContent='Scanning for barcode...';
        scanning=true;
        // Use continuous decode - this is the proper ZXing way
        await reader.decodeFromVideoDevice(undefined,vid,(result,err)=>{
            if(result&&scanning){
                const text=result.getText();
                if(text&&text.includes('|')){
                    scanning=false;
                    reader.reset();
                    found(text);
                }
            }
        });
    }catch(e){
        st.textContent='Scanner error: '+e.message;
        st.className='err';
    }
}

function found(text){
    rawText=text;
    const lic=parse(text);
    if(navigator.vibrate)navigator.vibrate([100,50,100]);
    st.textContent='Licence decoded!';
    st.className='ok';
    ln.style.display='none';

    let h='<div class="res">';
    for(const[k,lb]of Object.entries(LABELS)){
        let v=lic[k]||'N/A',c='';
        if(k==='expiry_date'&&v!=='N/A'){
            const exp=new Date(v),now=new Date();
            if(exp<now){c='w';v+=' (EXPIRED)'}else{c='g'}
        }
        h+=`<div class="r"><span class="l">${lb}:</span><span class="v ${c}">${v}</span></div>`;
    }
    h+='</div>';
    rs.innerHTML=h;rs.classList.remove('hid');bt.classList.remove('hid');
}

window.send=function(){
    if(!rawText)return;
    if(tg){tg.sendData(rawText);tg.close()}
    else{navigator.clipboard?.writeText(rawText);st.textContent='Copied!'}
};

window.again=function(){
    rawText=null;
    rs.classList.add('hid');bt.classList.add('hid');
    st.textContent='Scanning...';st.className='';
    ln.style.display='';
    scanning=true;
    startContinuousScan();
};

// Init
const ok=await initReader();
if(ok){
    st.textContent='Starting camera...';
    startContinuousScan();
}else{
    st.textContent='Scanner library failed to load';
    st.className='err';
}
</script>
</body>
</html>
